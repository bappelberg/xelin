services:
  frontend:
    build:
      context: ./frontend
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=xelin
      - DB_USER=xelin
      - DB_PASSWORD=${DB_PASSWORD}

      # 👇 LDAP config (viktigt för Spring Boot senare)
      - LDAP_URL=ldap://ldap:389
      - LDAP_BASE_DN=dc=foi,dc=se

    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ldap:
        condition: service_started

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=xelin
      - POSTGRES_USER=xelin
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - xelin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xelin -d xelin"]
      interval: 10s
      timeout: 5s
      retries: 5

  ldap:
    image: osixia/openldap:2.6.10-alpha
    container_name: ldap
    hostname: ldap.foi.se
    ports:
      - "389:389"
    environment:
      LDAP_ORGANISATION: "FOI"
      LDAP_DOMAIN: "foi.se"
      LDAP_ADMIN_PASSWORD: "admin"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

volumes:
  xelin_pgdata:
  ldap_data:
  ldap_config: