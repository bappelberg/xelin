services:
  frontend:
    build:
      context: ./frontend

  backend:
    build:
      context: ./backend
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=xelin
      - DB_USER=xelin
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=xelin
      - POSTGRES_USER=xelin
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - xelin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xelin -d xelin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  xelin_pgdata:
