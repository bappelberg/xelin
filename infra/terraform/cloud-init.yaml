#cloud-config
package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - ufw
  - docker.io
  - docker-compose-v2
  - certbot
  - iptables-persistent

runcmd:
  # OCI blockerar port 80/443 via iptables by default — öppna innan UFW
  - iptables -I INPUT -p tcp --dport 80 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 443 -j ACCEPT
  - netfilter-persistent save

  # Aktivera och konfigurera brandvägg
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ssh
  - ufw allow http
  - ufw allow https
  - ufw --force enable

  # Starta Docker
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu



final_message: "VM är redo efter $UPTIME sekunder"
