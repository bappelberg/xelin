events {
    # Max number of simultaneous connections per worker process
    worker_connections 1024;
}

http {
    # server_tokens hides Nginx version from HTTP responses (e.g. "Server: nginx" instead of "Server: nginx/1.25.3")
    server_tokens off;

    # Server block 1: HTTP → HTTPS redirect (except ACME challenge)
    server {
        listen 80;
        server_name xelin.duckdns.org;

        # Let certbot verify domain ownership via this path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Server block 2: HTTPS (the real server)
    server {
        # Listen on port 443 with SSL/TLS enabled
        listen 443 ssl;

        # Only handle requests for this domain
        server_name xelin.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/xelin.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/xelin.duckdns.org/privkey.pem;

        # HSTS: tells browsers to ONLY use HTTPS for this domain for 1 year (31536000s)
        # includeSubDomains applies the rule to all subdomains as well
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Prevents browsers from MIME-sniffing responses (e.g. treating a .txt file as executable JS)
        add_header X-Content-Type-Options nosniff always;

        # Prevents the site from being embedded in an <iframe> — protects against clickjacking
        add_header X-Frame-Options DENY always;

        # Route 1: anything not matching /api/ goes to the frontend container
        location / {
            # Forward the request to the frontend service on port 3000 (Docker service name)
            proxy_pass         http://frontend:3000;

            # Pass the original Host header so the backend knows which domain was requested
            proxy_set_header   Host $host;

            # Pass the real client IP address
            proxy_set_header   X-Real-IP $remote_addr;

            # Appends client IP to the X-Forwarded-For chain (useful if there are multiple proxies)
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Tells the backend the original request came in over HTTPS
            proxy_set_header   X-Forwarded-Proto https;
        }

        # Route 2: anything under /api/ goes to the backend container
        location /api/ {
            # Forward the request to the backend service on port 8080 (Docker service name)
            proxy_pass         http://backend:8080;

            # Same headers as above — preserve client info through the proxy
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Wait up to 30 seconds for the backend to respond before timing out
            # Useful for slow API calls (e.g. DB queries, file processing)
            proxy_read_timeout 30s;
        }
    }
}