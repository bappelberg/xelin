server:
  port: 8080

spring:
  application:
    name: xelin

  datasource:
    url: jdbc:postgresql://db:5432/xelin
    username: xelin
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ldap:
    urls: ldap://ldap:389 # ldap=docker compose service namn
    base: dc=foi,dc=se
    username: cn=admin,dc=foi,dc=se
    password: admin

# (valfritt men ofta bra)
logging:
  level:
    org.springframework.security: DEBUG